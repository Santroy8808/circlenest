<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Theta-Space">
  <defs>
    <radialGradient id="tileGlow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1b2a44"/>
      <stop offset="58%" stop-color="#0b1424"/>
      <stop offset="100%" stop-color="#050910"/>
    </radialGradient>
    <linearGradient id="gold" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff4a8"/>
      <stop offset="28%" stop-color="#ffd75a"/>
      <stop offset="52%" stop-color="#f5b629"/>
      <stop offset="76%" stop-color="#fff0a0"/>
      <stop offset="100%" stop-color="#bf8120"/>
    </linearGradient>
    <filter id="thetaGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#ffd75a" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#f5b629" flood-opacity="0.38"/>
    </filter>
    <filter id="sparkGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#tileGlow)"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="12.5" fill="none" stroke="#d7a833" stroke-opacity="0.55"/>
  <text
    x="32"
    y="46"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="45"
    font-weight="700"
    fill="url(#gold)"
    stroke="#fff0a0"
    stroke-width="0.7"
    filter="url(#thetaGlow)"
  >θ</text>
  <g filter="url(#sparkGlow)" fill="#ffe681">
    <path d="M49 13l1.2 3.2 3.3 1.1-3.3 1.2L49 22l-1.2-3.5-3.3-1.2 3.3-1.1L49 13z"/>
    <path d="M17 46l.8 2.1 2.2.8-2.2.8-.8 2.3-.8-2.3-2.2-.8 2.2-.8L17 46z"/>
    <circle cx="52" cy="36" r="1.5"/>
    <circle cx="44" cy="9" r="1"/>
    <circle cx="12" cy="19" r="1.1"/>
  </g>
</svg>
